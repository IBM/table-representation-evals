# TaBERT approach configuration
approach_name: tabert
name: tabert

module_path: "approaches/benchmark_approaches_src/tabert"
class_name: TaBertEmbedder

# Path to a pre-trained TaBERT checkpoint (.bin file).
# Set to null to fall back to a bert-base-uncased initialisation (no pre-training).
#
# Download pre-trained weights with:
#   bash approaches/benchmark_approaches_src/tabert/setup.sh
#
# Example after extracting TaBERT_Base_(K=1):
#   model_path: "approaches/benchmark_approaches_src/tabert/tabert_src/pretrained_weights/tabert_base_k1/model.bin"
model_path: "approaches/benchmark_approaches_src/tabert/tabert_src/pretrained_weights/tabert_base_k1/model.bin"

# Maximum number of rows passed to the model; -1 means no limit.
# TaBERT encodes each row individually so large tables can be expensive.
table_row_limit: 100

# Embedding dimensionality (768 for BERT-base, 1024 for BERT-large)
embedding_dim: 768
