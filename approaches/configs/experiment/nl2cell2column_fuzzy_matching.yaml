# @package _global_
# Experiment configuration for NL2Cell2Column Mapping with Fuzzy/Semantic Matching
# Uses fuzzy_cell_matching.json from BIRD benchmark
# Tests semantic matching with fuzzified cell values (non-exact matches)

defaults:
  - /experiment_datasets/global_datasets
  - override /approach: sentence_transformer # Change to your preferred approach

hydra:
  verbose: True # set to True for debug outprints, set to False for Info prints only
  sweeper:
    params:
      approach.embedding_model: all-MiniLM-L6-v2 # Change to your preferred model

benchmark_output_dir: nl2cell2column_experiments

benchmark_tasks:
  #################################### 
  ###### NL2Cell2Column Mapping - Fuzzy/Semantic Matching
  #################################### 
  nl2cell2column_mapping:
    datasets:
      - bird # Uses BIRD benchmark with SQLite databases
    task_parameters:
      # Query embedding mode: "full_nl", "extracted_values", or "both"
      query_mode: both
      
      # Maximum number of unique values to sample per column
      # Matched values from queries are ALWAYS included regardless of this limit
      max_unique_values_per_column: 1000
      
      # Number of nearest neighbor cells to retrieve from Qdrant
      top_k_cells: 100
      
      # Maximum number of queries to process (null = all queries)
      max_queries: null
    
    # Override dataset configuration to use fuzzy matching benchmark
    dataset_overrides:
      nl2cell2column_benchmark_file: "fuzzy_cell_matching.json"

