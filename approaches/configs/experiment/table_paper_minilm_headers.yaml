# @package _global_
# Header-only retrieval run for MiniLM: table_row_limit=0, markdown only.
# (csv at row_limit=0 is redundant -- header-only content is structurally the same.)
defaults:
  - /experiment_datasets/global_datasets
  - override /approach: sentence_transformer

hydra:
  verbose: False
  sweeper:
    params:
      approach.embedding_model: all-MiniLM-L6-v2
      approach.table_row_limit: 0
      approach.table_serialization_format: markdown

benchmark_output_dir: table_paper_experiments

benchmark_tasks:
  table_retrieval:
    datasets: ${experiment_datasets.table_retrieval_datasets}
    task_parameters:
      force_embed_corpus: False
