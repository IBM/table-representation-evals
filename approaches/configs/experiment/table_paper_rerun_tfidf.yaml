# @package _global_
# Rerun: TF-IDF table retrieval on spider-train at table_row_limit=100.
defaults:
  - /experiment_datasets/global_datasets
  - override /approach: tfidf

hydra:
  verbose: False
  sweeper:
    params:
      approach.table_row_limit: 100
      approach.n_features: 32768

benchmark_output_dir: table_paper_experiments

benchmark_tasks:
  table_retrieval:
    datasets:
      - spider-train
    task_parameters:
      force_embed_corpus: True
