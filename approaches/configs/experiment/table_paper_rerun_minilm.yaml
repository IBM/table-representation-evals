# @package _global_
# Rerun: MiniLM table retrieval on spider-train at table_row_limit=100, sweeping md/csv.
defaults:
  - /experiment_datasets/global_datasets
  - override /approach: sentence_transformer

hydra:
  verbose: False
  sweeper:
    params:
      approach.embedding_model: all-MiniLM-L6-v2
      approach.table_row_limit: 100
      approach.table_serialization_format: markdown,csv

benchmark_output_dir: table_paper_experiments

benchmark_tasks:
  table_retrieval:
    datasets:
      - spider-train
    task_parameters:
      force_embed_corpus: True
