# @package _global_
# Header-only retrieval run for TF-IDF BoW baseline: table_row_limit=0.
defaults:
  - /experiment_datasets/global_datasets
  - override /approach: tfidf

hydra:
  verbose: False
  sweeper:
    params:
      approach.table_row_limit: 0
      approach.n_features: 32768

benchmark_output_dir: table_paper_experiments

benchmark_tasks:
  table_retrieval:
    datasets: ${experiment_datasets.table_retrieval_datasets}
    task_parameters:
      force_embed_corpus: False
