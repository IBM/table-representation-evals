# @package _global_
# Header-only retrieval run for GritLM: table_row_limit=0, markdown only.
defaults:
  - /experiment_datasets/global_datasets
  - override /approach: GritLM

hydra:
  verbose: False
  sweeper:
    params:
      approach.embedding_model: GritLM/GritLM-7B
      approach.table_row_limit: 0
      approach.table_serialization_format: markdown

benchmark_output_dir: table_paper_experiments

benchmark_tasks:
  table_retrieval:
    datasets: ${experiment_datasets.table_retrieval_datasets}
    task_parameters:
      force_embed_corpus: False
