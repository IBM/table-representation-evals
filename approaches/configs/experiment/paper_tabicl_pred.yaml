# @package _global_
defaults:
  - /experiment_datasets/global_datasets
  - override /approach: tabicl
  
hydra:
  verbose: True
  sweeper:
    params:
      approach.n_estimators: 32 # Use fewer estimators for testing and to reduce memory usage
      approach.predML_based_on: custom_predictiveML_model
  launcher:
    n_jobs: 10  # Use single job to avoid sklearn multiprocessing issues

benchmark_output_dir: main_experiments 

benchmark_tasks:
  ################################### 
  ###### Predictive ML
  #################################### 
  predictive_ml:
    datasets: ${experiment_datasets.predictive_ml_datasets} 
    # exclude_datasets: # Tabicl v1 cannot do regression
    #   #################################### 
    #   ## Regression (contain string columns)
    #   #################################### 
    #   - healthcare_insurance_expenses  # 1338 rows, 6 columns, [3/6] categorical
    #   - Another-Dataset-on-used-Fiat-500  # 1538 rows, 7 columns, [1/7] categorical
    #   - wine_quality  # 6497 rows, 12 columns, [1/12] categorical
    #   - Food_Delivery_Time  # 45451 rows, 9 columns, [3/9] categorical
    #   - diamonds  # 53940 rows, 9 columns, [3/9] categorical
    #   #################################### 
    #   ## Regression (do not contain string columns)
    #   ####################################  
    #   - QSAR_fish_toxicity  # 907 rows, 6 columns, [0/6] categorical
    #   - concrete_compressive_strength  # 1030 rows, 8 columns, [0/8] categorical
    #   - airfoil_self_noise  # 1503 rows, 5 columns, [1/5] categorical
    #   - QSAR-TID-11  # 5742 rows, 1024 columns, [0/1024] categorical
    #   - miami_housing  # 13776 rows, 15 columns, [1/15] categorical
    #   - houses  # 20640 rows, 8 columns, [0/8] categorical
    #   - superconductivity  # 21263 rows, 81 columns, [0/81] categorical
    #   - physiochemical_protein  # 45730 rows, 9 columns, [0/9] categorical
    task_parameters:
      run_task_based_on: custom_predictiveML_model # needs to be either "row_embeddings" or "custom_predictiveML_model"