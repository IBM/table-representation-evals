# @package _global_
defaults:
  - /experiment_datasets/global_datasets
  - override /approach: tabpfn # must be how you named the config file for your approach

hydra:
  verbose: True # set to True for debug outprints, set to False for Info prints only
  sweeper:
    params:
      # if you add multiple parameters (seperated by , ), all combinations are run (hydra multirun)
      #approach.device: cuda # set to cpu if needed
      approach.predML_based_on: row_embeddings


benchmark_output_dir: main_experiments # how to call the folder inside /results (benchmark is not re-run if results exist for this configuration in the given folder)

benchmark_tasks:
  #################################### 
  ###### Row Similarity Search
  #################################### 
  row_similarity_search: # comment out the tasks you do not want to evaluate on
    datasets: ${experiment_datasets.row_similarity_search_datasets} # use the datasets from global config
    # datasets: # override if only a subset should be used
    exclude_datasets:
      - DBLP-GoogleScholar # 66879 rows, 5 columns  ### Too large for TabPFN
      - iTunes-Amazon # 62830 rows, 9 columns ### Too large for TabPFN
    task_parameters:
      run_similarity_search_based_on: row_embeddings # needs to be either "row_embeddings" or "custom_function"
  
  ####################################################################### 
  ###### Triplet-based Row Evaluations - based on Wikidata Hierarchies
  ####################################################################### 
  more_similar_than:
    datasets: ${experiment_datasets.more_similar_than_datasets}

  ################################### 
  ###### Predictive ML
  #################################### 
  predictive_ml:
    datasets: ${experiment_datasets.predictive_ml_datasets} 
    exclude_datasets:
    - customer_satisfaction_in_airline # TabPFN can handle maximum of 50k rows
    - APSFailure
    - GiveMeSomeCredit
    - SDSS17
    task_parameters:
      #run_task_based_on: custom_predictiveML_model # needs to be either "row_embeddings" or "custom_predictiveML_model"
      run_task_based_on: row_embeddings