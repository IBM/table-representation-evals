      min_rows: 5
      max_rows: 100
      min_cols: 3
      max_cols: 30
    triplets_per_anchor: 1
    pos_params:
      pos_type: both
      pos_strength: 0.75
    neg_params:
      neg_columns_frac: 0.2
      neg_degree: 0.2
  v3:
    dataset:
      min_rows: 5
      max_rows: 100
      min_cols: 3
      max_cols: 30
    triplets_per_anchor: 1
    pos_params:
