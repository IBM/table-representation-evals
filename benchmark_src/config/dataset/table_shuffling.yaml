dataset_name: table_shuffling

random_seed: 1

# Table shuffling configuration:
# - Global variations (v0..v8) define row/column filters and perturbation params.
# - Per-dataset blocks only define dataset-specific settings such as max_tables.
#
# Variation grid (pos_type x magnitude):
#   pos_type      | magnitude       | id
#   ------------- | --------------- | ---
#   both          | hi-pos / hi-neg | v0
#   both          | lo-pos / hi-neg | v1
#   both          | hi-pos / lo-neg | v2
#   row_reorder   | hi-pos / hi-neg | v3
#   row_reorder   | lo-pos / hi-neg | v4
#   row_reorder   | hi-pos / lo-neg | v5
#   col_reorder   | hi-pos / hi-neg | v6
#   col_reorder   | lo-pos / hi-neg | v7
#   col_reorder   | hi-pos / lo-neg | v8
#
# Size ablation (all at hi-pos/hi-neg magnitude, mirroring v0/v3/v6 pos_types):
#   pos_type      | window  | id
#   ------------- | ------- | ---
#   both          | BIG     | v9
#   row_reorder   | BIG     | v10
#   col_reorder   | BIG     | v11
#   both          | SMALL   | v12
#   row_reorder   | SMALL   | v13
#   col_reorder   | SMALL   | v14
#
# Magnitude knobs (neg_columns_frac and neg_degree move together as one neg-magnitude axis):
#   hi-pos = pos_strength 0.75 ; lo-pos = pos_strength 0.25
#   hi-neg = neg_columns_frac 0.7, neg_degree 0.8
#   lo-neg = neg_columns_frac 0.2, neg_degree 0.2
#
# Filter windows:
#   default = min_rows=5,  max_rows=100, min_cols=3, max_cols=30
#   BIG     = min_rows=5,  max_rows=500, min_cols=3, max_cols=80
#   SMALL   = min_rows=5,  max_rows=20,  min_cols=3, max_cols=8

datasets:
  fetaqa:
    source: target
    max_tables: 500
  tabfact:
    source: target
    max_tables: -1
  ottqa:
    source: target
    max_tables: 500
  spider-train:
    source: target
    max_tables: 500
  ckan_subset:
    source: ckan_subset
    data_dir: cache/dataset_creation_resources/ckan-subset/tables
    max_tables: 5000
  ecb:
    source: ecb
    data_dir: cache/dataset_creation_resources/tables
    max_tables: -1
    max_rows_per_table: 500

variations:
  v0:
    dataset:
      min_rows: 5
      max_rows: 100
      min_cols: 3
      max_cols: 30
    triplets_per_anchor: 1
    pos_params:
      pos_type: both
      pos_strength: 0.75
    neg_params:
      neg_columns_frac: 0.7
      neg_degree: 0.8
  v1:
    dataset:
      min_rows: 5
      max_rows: 100
      min_cols: 3
      max_cols: 30
    triplets_per_anchor: 1
    pos_params:
      pos_type: both
      pos_strength: 0.25
    neg_params:
      neg_columns_frac: 0.7
      neg_degree: 0.8
  v2:
