# Axis domain (min, max) per metric, used to force plots to cover the full metric
# range instead of a data-driven range. A max/min of "∞" means there is no fixed
# upper/lower bound for that metric — fall back to the data's own min/max instead.
# Matched by prefix against the metric name (e.g. "MRR" also covers "MRR@1"),
# be aware that defaults might change over time and new metrics will need adding here.
metric_ranges:
  silhouette: [-1, 1]
  MRR: [0, 1]
  MAP: [0, 1]
  Precision: [0, 1]
  Recall: [0, 1]
  total_queries: [0, "∞"]
  MRR@1: [0, 1]
  MAP@1: [0, 1]
  Recall@1: [0, 1]
  Precision@1: [0, 1]
  total_overlap@1: [0, "∞"]
  MRR@3: [0, 1]
  MAP@3: [0, 1]
  Recall@3: [0, 1]
  Precision@3: [0, 1]
  total_overlap@3: [0, "∞"]
  MRR@5: [0, 1]
  MAP@5: [0, 1]
  Recall@5: [0, 1]
  Precision@5: [0, 1]
  total_overlap@5: [0, "∞"]
  MRR@10: [0, 1]
  MAP@10: [0, 1]
  Recall@10: [0, 1]
  Precision@10: [0, 1]
  total_overlap@10: [0, "∞"]
  accuracy: [0, 1]
  accuracy_easy: [0, 1]
  accuracy_medium: [0, 1]
  macro_f1: [0, 1]
  mean_mrr: [0, 1]
  "In top-1 [%]": [0, 100]
  "In top-3 [%]": [0, 100]
  "In top-5 [%]": [0, 100]
  "In top-10 [%]": [0, 100]
  LinearRegression_rmse: [0, "∞"]
  XGBoost_roc_auc_score: [0, 1]
  XGBoost_log_loss: [0, "∞"]
  "peak_cpu (%)": [0, "∞"]
  "peak_memory (MB)": [0, "∞"]
  "execution_time (s)": [0, "∞"]
