# @package _global_

# Dataset configuration for BIRD (BIg Bench for LaRge-scale Database Grounded Text-to-SQL Evaluation)
# https://bird-bench.github.io/

dataset_name: bird

# Configuration for the dataset
dataset:
  # Optional: set to an absolute path if you already have BIRD data elsewhere.
  # If null (default), data is read from cache/datasets/bird/ (set up by SETUP_DATASETS).
  bird_path: null

  # Benchmark files, keyed by task name (looked up as {task_name}_benchmark_file in task code)
  nl2column_mapping_benchmark_file: "pure_concept_mapping_queries.json"
  nl2cell2column_mapping_benchmark_file: "cell_value_matching_queries.json"
  nl2cell2column_fuzzy_mapping_benchmark_file: "fuzzy_cell_matching.json"

