approach_name: tabula_8b
conda_env: benchmark_env
module_path: "approaches/benchmark_approaches_src/tabula_8b"
class_name: TabuLA8BEmbedder

model_name: "mlfoundations/tabula-8b"
device: "cuda"
max_length: 2048  # context length recommended by TabuLA-8B's own evaluation code
batch_size: 1  # TabuLA-8B's own evaluation code processes one row at a time
n_few_shot_examples: 8  # a shot count TabuLA-8B's paper reports on that fits max_length=2048

supported_tasks:
  row_similarity_search:
    run_similarity_search_based_on: row_embeddings
  more_similar_than: {}
  predictive_ml:
    run_task_based_on: row_embeddings  # default; override to custom_predictiveML_model in pred run
