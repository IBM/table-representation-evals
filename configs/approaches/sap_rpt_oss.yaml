approach_name: sap_rpt_oss
conda_env: benchmark_env
module_path: "approaches/benchmark_approaches_src/sap_rpt_oss"
class_name: SAP_RPT_OSS_Embedder

# For best performance, use max_context_size=8192 and bagging=8 (requires 80GB GPU) —
# the paper run config overrides both. These lighter defaults (2048/1) fit smaller GPUs.
bagging: 1
max_context_size: 2048
device: "auto"

supported_tasks:
  row_similarity_search:
    run_similarity_search_based_on: row_embeddings
    exclude_datasets:  # OOM on 80GB VRAM
      - DBLP-GoogleScholar
      - iTunes-Amazon
  more_similar_than: {}
  column_similarity_search:
    run_similarity_search_based_on: column_embeddings
  cell_similarity_search: {}
  predictive_ml:
    run_task_based_on: row_embeddings  # default; override to custom_predictiveML_model in pred run
  schema_linking: {}
  value_linking: {}
  column_type_annotation: {}
