approach_name: tabert
conda_env: benchmark_env_tabert
module_path: "approaches/benchmark_approaches_src/tabert"
class_name: TaBertEmbedder

table_row_limit: 100
# Path to the pretrained TaBERT_Base_(K=1) checkpoint, populated by tabert/setup.sh.
# Falls back to bert-base-uncased initialisation if the file isn't present.
model_path: "approaches/benchmark_approaches_src/tabert/tabert_src/pretrained_weights/tabert_base_k1/model.bin"

supported_tasks:
  row_similarity_search:
    run_similarity_search_based_on: row_embeddings
  row_triplet_evaluation: {}
  column_similarity_search:
    run_similarity_search_based_on: column_embeddings
  cell_similarity_search: {}
  column_type_annotation: {}
  schema_linking: {}
  value_linking: {}
  table_retrieval: {}
  table_similarity_search: {}
  table_type_detection: {}
  predictive_ml:
    run_task_based_on: row_embeddings
    exclude_datasets:
      - coil2000_insurance_policies
      - kddcup09_appetency
      - Diabetes130US
      - customer_satisfaction_in_airline
      - Bioresponse
      - APSFailure
      - GiveMeSomeCredit
      - hiva_agnostic
      - SDSS17
      - QSAR_fish_toxicity
      - QSAR-TID-11
      - superconductivity
