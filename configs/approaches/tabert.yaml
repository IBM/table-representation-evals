approach_name: tabert
conda_env: embedding-benchmark
module_path: "approaches/benchmark_approaches_src/tabert"
class_name: TaBertEmbedder

table_row_limit: 100

supported_tasks:
  row_similarity_search:
    run_similarity_search_based_on: row_embeddings
  more_similar_than: {}
  column_similarity_search:
    run_similarity_search_based_on: column_embeddings
  cell_task: {}
  table_retrieval: {}
  predictive_ml:
    run_task_based_on: row_embeddings
    exclude_datasets:
      - coil2000_insurance_policies
      - kddcup09_appetency
      - Diabetes130US
      - customer_satisfaction_in_airline
      - Bioresponse
      - APSFailure
      - GiveMeSomeCredit
      - hiva_agnostic
      - SDSS17
      - QSAR_fish_toxicity
      - QSAR-TID-11
      - superconductivity
