approach_name: tarte
conda_env: benchmark_env
module_path: "approaches/benchmark_approaches_src/tarte"
class_name: TARTEEmbedder

# Device for inference. "auto" selects CUDA if available, otherwise CPU.
device: "auto"

# Which transformer layers to average for the row embedding.
# "all" averages all 3 layers; can also be an int (0-2) or a list.
layer_index: "all"

# Number of rows to sample when computing column embeddings.
n_sample_rows_for_column_embeddings: 50

# schema_linking and value_linking are excluded because, while they don't
# call create_query_embedding() directly (they embed the NL query text via
# column/cell embedding components), TARTE's schema-aware FastText+transformer
# pipeline isn't designed to embed open-ended natural-language query strings.
# table_retrieval (TARGET-based, NL query → table) is excluded for the same
# reason: it needs create_query_embedding(), which is unimplemented.
# table_similarity_search (gitTables) and table_type_detection are supported
# since they only use create_table_embedding().

supported_tasks:
  row_similarity_search:
    run_similarity_search_based_on: row_embeddings
    exclude_datasets:
      - DBLP-GoogleScholar   # >100k rows; slow per-row inference
      - iTunes-Amazon
  row_triplet_evaluation: {}
  clustering: {}
  table_shuffling: {}
  column_similarity_search:
    run_similarity_search_based_on: column_embeddings
  column_type_annotation: {}
  table_similarity_search: {}
  table_type_detection: {}
  cell_similarity_search: {}
  predictive_ml:
    run_task_based_on: row_embeddings
    exclude_datasets:
      - customer_satisfaction_in_airline
      - APSFailure
      - GiveMeSomeCredit
      - SDSS17
