benchmark_output_dir: main_experiments
approaches:

  # ── Sentence transformer models ───────────────────────────────────────────
  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
      table_row_limit: 100

  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
      table_row_limit: 0  # "Just Schema" variant for the paper's table_retrieval comparison
    tasks: [table_retrieval]

  - name: sentence_transformer
    params:
      embedding_model: ibm-granite/granite-embedding-english-r2
      table_row_limit: 100

  - name: sentence_transformer
    params:
      embedding_model: ibm-granite/granite-embedding-english-r2
      table_row_limit: 0  # "Just Schema" variant for the paper's table_retrieval comparison
    tasks: [table_retrieval]

  # ── XGBoost baseline ──────────────────────────────────────────────────────
  - name: baseline

  # ── Tabula-8B ─────────────────────────────────────────────────────────────
  - name: tabula_8b
    params:
      run_task_based_on: row_embeddings  # default from approach config; can be omitted

  # custom_predictiveML_model mode is skipped for tabula_8b: it didn't produce reliable output (empty generations)

  # ── SAP RPT OSS ───────────────────────────────────────────────────────────
  - name: sap_rpt_oss
    params:
      run_task_based_on: row_embeddings  # default from approach config; can be omitted
      bagging: 8
      max_context_size: 8192
    task_exclude_datasets:
      predictive_ml:  # OOM on 80GB VRAM in row-embeddings mode
        - kddcup09_appetency
        - Diabetes130US
        - customer_satisfaction_in_airline
        - Bioresponse
        - hiva_agnostic
        - QSAR-TID-11
        - superconductivity
        - APSFailure
        - GiveMeSomeCredit
        - SDSS17
        - diamonds

  - name: sap_rpt_oss
    params:
      run_task_based_on: custom_predictiveML_model
      bagging: 8
      max_context_size: 8192
    tasks: [predictive_ml]

  # ── TabPFN ────────────────────────────────────────────────────────────────
  - name: tabpfn
    params:
      run_task_based_on: row_embeddings  # default from approach config; can be omitted

  - name: tabpfn
    params:
      run_task_based_on: custom_predictiveML_model
    tasks: [predictive_ml]

  # ── Mitra ─────────────────────────────────────────────────────────────────
  - name: mitra
