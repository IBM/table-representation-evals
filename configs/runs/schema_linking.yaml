benchmark_output_dir: test_schema_linking_experiments
task_params:
  max_queries: 100
approaches:
  # NL2Column mapping (concept-based, no cell values)
  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
    tasks:
      - nl2column_mapping

  # NL2Cell2Column mapping — exact benchmark, both query modes
  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
    tasks:
      - nl2cell2column_mapping
    task_params:
      nl2cell2column_mapping:
        query_mode: full_nl
  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
    tasks:
      - nl2cell2column_mapping
    task_params:
      nl2cell2column_mapping:
        query_mode: extracted_values

  # NL2Cell2Column mapping — fuzzy benchmark, both query modes
  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
    tasks:
      - nl2cell2column_fuzzy_mapping
    task_params:
      nl2cell2column_fuzzy_mapping:
        query_mode: full_nl
  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
    tasks:
      - nl2cell2column_fuzzy_mapping
    task_params:
      nl2cell2column_fuzzy_mapping:
        query_mode: extracted_values
