benchmark_output_dir: schema_linking_experiments

# Run only the three schema linking tasks for all approaches below.
# Remove this to run all tasks each approach supports.
tasks:
  - nl2column_mapping
  - nl2cell2column_mapping

approaches:
  - name: sentence_transformer
    params:
      embedding_model: all-MiniLM-L6-v2
      table_row_limit: 100

  - name: sentence_transformer
    params:
      embedding_model: ibm-granite/granite-embedding-english-r2
      table_row_limit: 100

  - name: sap_rpt_oss

  - name: GritLM
    params:
      embedding_model: GritLM/GritLM-7B

  - name: hytrel
