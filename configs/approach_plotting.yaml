# Curated display name + plot color per (approach, configuration) pair, shared by
# prepare_paper_figures/ and the general post-run plots
# (benchmark_src/results_processing/create_plots.py).
# Any (approach, configuration) not listed here, or missing a color/name field, falls
# back to an auto-assigned palette color / the raw approach name, and a warning is
# logged naming the missing pair so it can be added here.
# An optional `marker` field (matplotlib marker code) is used by the VRAM quadrant
# chart to distinguish approaches whose curated colors are visually similar; approaches
# without a `marker` default to a circle.

